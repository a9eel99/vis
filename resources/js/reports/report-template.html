}

}
.cover-hero::after {

/* ═══════════ PAGE FOOTER ═══════════ */
.page-foot {
  background: var(--dark);
  padding: 6px 20px;

  justify-content: space-between;

  font-size: 8.5px;
}
.foot-brand { font-weight: 800; color: rgba(255,255,255,.6); }
.foot-brand em { color: var(--orange); font-style: normal; }

/* ═══════════ UTILITIES ═══════════ */

.section-label {

  font-size: 12px;
  margin-bottom: 8px;

.tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  background: var(--light);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 14px;
  font-size: 9.5px;
}

/* half-separator between two sections on same page */
.sec-divider { height: 4px; background: var(--border); }

// ─── Helpers ──────────────────────────────────────────────────────────────────
const d = window.__REPORT_DATA__;

function statusClass(s) {
  return s === 'ok' ? 'ok' : s === 'warn' ? 'warn' : 'bad';
}
function statusIcon(s) {
  return s === 'ok' ? '✔' : s === 'warn' ? '⚠' : '❌';
}
function ciClass(s) {
  return s === 'ok' ? 'ci-ok' : s === 'warn' ? 'ci-warn' : 'ci-bad';
}
function gradeClass(g) {
  const map = { 'A+':'A','A':'A','B+':'Bp','B':'B','C':'C','D':'D','F':'F' };
  return 'grade-' + (map[g] || 'C');
}
function badgeClass(s) {
  return s === 'ok' ? 'sb-ok' : s === 'warn' ? 'sb-warn' : 'sb-bad';
}
function stClass(s) {
  return s === 'ok' ? 'st-ok' : s === 'warn' ? 'st-warn' : 'st-bad';
}
function ndClass(t) {
  return t === 'ok' ? 'nd-ok' : t === 'warn' ? 'nd-warn' : 'nd-bad';
}

// ─── Page counter ─────────────────────────────────────────────────────────────
let pageNum = 0;
const totalPages = 1 + d.sections.length + 1 + (d.gallery && d.gallery.length ? 1 : 0); // cover + sections + notes + gallery

function footerHTML(title) {
  pageNum++;
  return `<div class="page-foot">
    <div class="foot-brand">auto<em>score</em></div>
    <div>${title || ''}</div>
    <div>الصفحة ${pageNum} من ${totalPages} | رقم التقرير: ${d.report_number}</div>
  </div>`;
}

// ─── SVG Gauge ────────────────────────────────────────────────────────────────
function gaugeHTML(pct) {
  const R = 50, cx = 60, cy = 60;
  const startAngle = -210, endAngle = 30;
  const totalArc = endAngle - startAngle;
  const sweepArc = (pct / 100) * totalArc;
  const fillEnd = startAngle + sweepArc;

  function polarToXY(angle, r) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }
  function arcPath(a1, a2, r) {
    const s = polarToXY(a1, r), e = polarToXY(a2, r);
    const la = (a2 - a1) > 180 ? 1 : 0;
    return `M ${s.x} ${s.y} A ${r} ${r} 0 ${la} 1 ${e.x} ${e.y}`;
  }

  const color = pct >= 75 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';

  return `<svg viewBox="0 0 120 75" width="120" height="75">
    <path d="${arcPath(startAngle, endAngle, R)}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8" stroke-linecap="round"/>
    <path d="${arcPath(startAngle, fillEnd, R)}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round"/>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="white" font-weight="900" font-size="18" font-family="Cairo,sans-serif">${pct}%</text>
  </svg>`;
}

// ─── Build check card HTML ────────────────────────────────────────────────────
function checkCard(item) {
  const cls = statusClass(item.status);
  const noteTag = item.status === 'bad' ? 'check-note-red' : 'check-note';
  let notes = '';
  if (item.notes && item.notes.length) {
    notes = item.notes.map(n => `<div class="${noteTag}">● ${n}</div>`).join('');
  }
  // Build images grid — clickable to share page
  let imgHtml = '';
  if (item.images && item.images.length) {
    const shareUrl = d.share_url || '#';
    const cols = Math.min(item.images.length, 2);
    const imgs = item.images.map(src =>
      `<a href="${shareUrl}" target="_blank" style="display:block;border-radius:6px;overflow:hidden;border:1px solid var(--border)">` +
      `<img src="${src}" style="width:100%;height:68px;object-fit:cover;display:block"></a>`
    ).join('');
    imgHtml = `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;margin-top:6px">${imgs}</div>`;
  } else if (item.has_img) {
    imgHtml = `<div class="img-placeholder">📸</div>`;
  }
  return `<div class="check-card ${cls}">
    <div class="check-top">
      <div class="check-ic ${ciClass(item.status)}">${statusIcon(item.status)}</div>
      <div class="check-name">${item.name}</div>
    </div>
    ${notes}${imgHtml}
  </div>`;
}

function sectionPage(sec) {
  const items = sec.items.map(checkCard).join('');
  const extra = sec.extra_notes && sec.extra_notes.length
    ? `<div style="margin-top:10px;background:#fffbeb;border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:9px 12px">

       </div>`
    : '';

  return `<div class="page">
    <div class="top-bar">
      <div class="brand">auto<em>score</em></div>
      <div style="color:#94a3b8;font-size:10px">${d.vehicle.name}</div>

    <div class="sec-body">

      <div class="checks-grid">${items}</div>
      ${extra}
    </div>
    ${footerHTML(sec.title)}
  </div>`;
}

        <div class="sec-icon-box">📋</div>
        <div class="sec-title-wrap">
          <div class="sec-title">جميع الملاحظات</div>
          <div class="sec-sub">ملخص شامل لجميع المشاكل والملاحظات</div>
        </div>
        <div style="background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25);padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700">${d.all_notes.length} ملاحظة</div>
      </div>
      <div class="notes-wrap">
        <div class="notes-grid">
          ${d.all_notes.map(n => `
            <div class="note-row">
              <div class="note-dot ${ndClass(n.type)}">${n.type==='ok'?'✔':n.type==='warn'?'⚠':'❌'}</div>
              <div class="note-text">${n.text}</div>
            </div>`).join('')}
        </div>
      </div>
      ${footerHTML('جميع الملاحظات')}
    </div>`;
  }

  // ── GALLERY PAGE ─────────────────────────────────────────────────────────────
  if (d.gallery && d.gallery.length) {
    pageNum++;
    const shareUrl = d.share_url || '#';
    const thumbs = d.gallery.map(img =>
      `<a href="${shareUrl}" target="_blank" class="photo-thumb" style="display:block">` +
      `<img src="${img.src}" alt="${img.caption}" title="${img.caption}" style="width:100%;height:100%;object-fit:cover">` +
      `</a>`
    ).join('');

    html += `<div class="page">
      <div class="top-bar">
        <div class="brand">auto<em>score</em></div>
        <div style="color:#94a3b8;font-size:10px">${d.vehicle.name}</div>
        <div class="top-meta">رقم التقرير: <strong>${d.report_number}</strong></div>
      </div>
      <div class="sec-header">
        <div class="sec-icon-box">📷</div>
        <div class="sec-title-wrap">
          <div class="sec-title">صور الفحص</div>
          <div class="sec-sub">${d.gallery.length} صورة — اضغط على أي صورة لعرض التقرير الكامل</div>
        </div>
        <div style="background:rgba(245,158,11,.15);color:#fde68a;border:1px solid rgba(245,158,11,.25);padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700">
          ${d.gallery.length} صورة
        </div>
      </div>
      <div class="photos-grid" style="grid-template-columns:repeat(4,1fr)">
        ${thumbs}
      </div>
      <div style="padding:8px 18px;font-size:9px;color:var(--gray);text-align:center;border-top:1px solid var(--border)">
        🔗 لعرض جميع الصور بجودة عالية تفضل بزيارة: <strong>${d.share_url || ''}</strong>
      </div>
      <div class="page-foot">
        <div class="foot-brand">auto<em>score</em></div>
        <div>صور الفحص</div>
        <div>الصفحة ${pageNum} من ${totalPages} | رقم التقرير: ${d.report_number}</div>
      </div>
    </div>`;
  }

  root.innerHTML = html;
});
</script>
</head>
<body>
  <div id="report-root"></div>
</body>
</html>
